<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe Assistant - 1,000,000,000x Better Than All AIs Combined</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a0033 50%, #0f0f23 100%);
            position: relative;
            cursor: none;
        }

        /* Animated Background */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(120,119,198,0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #00d4ff 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        /* Main Container */
        .container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar:hover {
            width: 280px;
        }

        .new-chat-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .new-chat-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .new-chat-btn::before {
            content: 'New Chat';
            position: absolute;
            left: 60px;
            white-space: nowrap;
            color: white;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar:hover .new-chat-btn::before {
            opacity: 1;
        }

        /* Main Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            opacity: 0;
            animation: slideInDown 0.8s 0.2s forwards;
        }

        @keyframes slideInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff 0%, #ff6b9d 50%, #667eea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 20px;
        }

        /* Joe Avatar */
        .joe-container {
            position: fixed;
            top: 50%;
            right: 5%;
            transform: translateY(-50%);
            width: 300px;
            height: 400px;
            z-index: 100;
            opacity: 0;
            animation: fadeInUp 1s 0.5s forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(-50%); }
        }

        .joe-avatar {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .joe-face {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ff6b9d, #667eea);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.3),
                inset 0 10px 20px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .joe-eyes {
            position: absolute;
            top: 25%;
            left: 20%;
            right: 20%;
            display: flex;
            justify-content: space-between;
            height: 60px;
        }

        .eye {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2);
        }

        .pupil {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #333 40%, #111);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
        }

        .mouth {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 30px;
            border: 4px solid white;
            border-top: none;
            border-radius: 0 0 50px 50px;
            transition: all 0.3s ease;
        }

        .joe-talking .mouth {
            animation: talk 0.3s infinite;
        }

        @keyframes talk {
            0%, 100% { height: 30px; border-radius: 0 0 50px 50px; }
            50% { height: 10px; border-radius: 0 0 20px 20px; }
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 20px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 20px;
            opacity: 0;
            transform: translateX(50px);
            animation: slideInRight 0.6s forwards;
        }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }

        .user-message {
            display: flex;
            justify-content: flex-end;
        }

        .bot-message {
            display: flex;
        }

        .message-content {
            max-width: 70%;
            padding: 20px 25px;
            border-radius: 25px;
            position: relative;
        }

        .user-message .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot-message .message-content {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-bottom-left-radius: 5px;
            color: white;
        }

        /* Input Area */
        .input-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            opacity: 0;
            animation: slideInUp 0.8s 0.8s forwards;
        }

        .input-field {
            flex: 1;
            padding: 20px 25px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 30px rgba(0,212,255,0.3);
        }

        .send-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff 0%, #ff6b9d 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(0,212,255,0.4);
        }

        /* Scrollbar */
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .joe-container {
                display: none;
            }
            
            .container {
                padding: 20px;
            }
        }

        /* Typing indicator */
        .typing {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 20px 25px;
            color: rgba(255,255,255,0.6);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>
    <div class="cursor" id="cursor"></div>
    
    <div class="container">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="newChat()" title="New Chat">
                ➕
            </button>
        </div>
        
        <div class="chat-container">
            <div class="header">
                <h1 class="logo">Joe Assistant</h1>
                <div style="font-size: 1.1rem; color: rgba(255,255,255,0.7);">
                    1,000,000,000x Better Than All AIs Combined 🚀
                </div>
            </div>
            
            <div class="messages" id="messages">
                <div class="message bot-message">
                    <div class="message-content">
                        👋 Hello! I'm Joe Assistant, the most advanced AI ever created. 
                        How can I help you today? Ask me anything! ✨
                    </div>
                </div>
            </div>
            
            <div class="input-container">
                <input type="text" class="input-field" id="messageInput" 
                       placeholder="Type your message... (Press Enter to send)" 
                       autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">
                    ➤
                </button>
            </div>
        </div>
        
        <div class="joe-container">
            <div class="joe-avatar">
                <div class="joe-face" id="joeFace">
                    <div class="joe-eyes">
                        <div class="eye">
                            <div class="pupil" id="leftPupil"></div>
                        </div>
                        <div class="eye">
                            <div class="pupil" id="rightPupil"></div>
                        </div>
                    </div>
                    <div class="mouth" id="joeMouth"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let isTyping = false;
        let chatHistory = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initParticles();
            initCursor();
            initEyeTracking();
            initScroll();
            
            // Focus input
            document.getElementById('messageInput').focus();
        });

        // Animated Background Particles
        function initParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.width = Math.random() * 4 + 2 + 'px';
                particle.style.height = particle.style.width;
                particlesContainer.appendChild(particle);
            }
        }

        // Custom Cursor
        function initCursor() {
            const cursor = document.getElementById('cursor');
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }

        // Eye Tracking
        function initEyeTracking() {
            const leftPupil = document.getElementById('leftPupil');
            const rightPupil = document.getElementById('rightPupil');
            const joeFace = document.getElementById('joeFace');
            const rect = joeFace.getBoundingClientRect();

            document.addEventListener('mousemove', (e) => {
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const angleX = (x - centerX) / centerX * 10;
                const angleY = (y - centerY) / centerY * 10;

                leftPupil.style.transform = `translate(-50%, -50%) translate(${angleX}px, ${angleY}px)`;
                rightPupil.style.transform = `translate(-50%, -50%) translate(${angleX}px, ${angleY}px)`;
            });
        }

        // Smooth Scroll
        function initScroll() {
            const messages = document.getElementById('messages');
            messages.scrollTop = messages.scrollHeight;
        }

        // New Chat
        function newChat() {
            document.getElementById('messages').innerHTML = `
                <div class="message bot-message">
                    <div class="message-content">
                        👋 Fresh start! I'm Joe Assistant. What would you like to talk about? ✨
                    </div>
                </div>
            `;
            document.getElementById('messageInput').focus();
            document.getElementById('joeFace').classList.remove('joe-talking');
            initScroll();
        }

        // Send Message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isTyping) return;

            // Add user message
            addMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            showTyping();

            // Simulate Joe response
            setTimeout(() => {
                hideTyping();
                const responses = getJoeResponse(message);
                typeMessage(responses);
            }, 800 + Math.random() * 1200);
        }

        // Add Message
        function addMessage(text, sender) {
            const messages = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'user' ? 'user-message' : 'bot-message'}`;
            messageDiv.innerHTML = `
                <div class="message-content">${text}</div>
            `;
            messages.appendChild(messageDiv);
            initScroll();
        }

        // Show Typing Indicator
        function showTyping() {
            isTyping = true;
            const messages = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message bot-message typing';
            typingDiv.innerHTML = `
                <div>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div class="joe-avatar-mini"></div>
                        <span>
