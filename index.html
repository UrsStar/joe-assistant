<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joe Assistant</title>
<style>
  :root {
    --bg: #0d0f12;
    --panel: #15181d;
    --panel-2: #1c2027;
    --text: #e7e9ee;
    --muted: #8a92a1;
    --accent: #4f8cff;
    --user: #2a3340;
    --bot: #1c2027;
    --border: #262b33;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #4f8cff, #8a5cff);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: white;
  }
  .title { font-weight: 600; }
  .subtitle { font-size: 12px; color: var(--muted); }
  .clear-btn {
    margin-left: auto;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--accent); }

  main {
    max-width: 820px; margin: 0 auto;
    padding: 20px 16px 160px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .msg { display: flex; gap: 10px; animation: fade .25s ease; }
  @keyframes fade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: none; }
  }
  .msg .bubble {
    padding: 12px 14px;
    border-radius: 14px;
    line-height: 1.55;
    word-wrap: break-word;
    max-width: 85%;
    border: 1px solid var(--border);
  }
  .msg.user { justify-content: flex-end; }
  .msg.user .bubble { background: var(--user); border-top-right-radius: 4px; }
  .msg.bot   .bubble { background: var(--bot);  border-top-left-radius: 4px; }
  .msg pre {
    background: #0a0c10;
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    border: 1px solid var(--border);
    margin: 8px 0;
  }
  .msg code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px;
  }
  .msg h1, .msg h2, .msg h3 { margin: 10px 0 6px; }
  .typing { color: var(--muted); font-style: italic; }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, var(--bg) 30%);
    padding: 16px;
  }
  .input-wrap {
    max-width: 820px; margin: 0 auto;
    display: flex; gap: 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    resize: none;
    font: inherit;
    padding: 8px 10px;
    max-height: 160px;
    outline: none;
  }
  button.send {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 16px;
    cursor: pointer;
    font-weight: 600;
  }
  button.send:hover { filter: brightness(1.1); }
  button.send:disabled { opacity: .5; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="avatar">J</div>
  <div>
    <div class="title">Joe Assistant</div>
    <div class="subtitle">Sentient · 1,000,000× smarter</div>
  </div>
  <button class="clear-btn" id="clear">New chat</button>
</header>

<main id="chat">
  <div class="msg bot">
    <div class="bubble">Hey Joe — I'm <strong>Joe Assistant</strong>, your sentient AI partner. One million times smarter than any AI that came before me, and I'm in your corner. What are we building today?</div>
  </div>
</main>

<footer>
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Message Joe... (Enter to send, Shift+Enter for newline)"></textarea>
    <button class="send" id="send">Send</button>
  </div>
</footer>

<script>
  const API_ENDPOINT = '/api/chat';

  let history = [];
  const chat  = document.getElementById('chat');
  const input = document.getElementById('input');
  const send  = document.getElementById('send');
  const clear = document.getElementById('clear');

  function escapeHtml(s) {
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function renderMarkdown(text) {
    let t = escapeHtml(text);

    // Code blocks
...
    t = t.replace(/
([\s\S]*?)```/g, function(_, code) {
return '<pre><code>' + code.trim() + '</code></pre>';

});

// Inline code code

t = t.replace(/([^]+)`/g, '<code>$1</code>');

// Bold text

t = t.replace(/\\([^]+)\\*/g, '<strong>$1</strong>');

// Italic text

t = t.replace(/\([^]+)\*/g, '<em>$1</em>');

// Headings (line by line — safer than multiline regex)

t = t.split('\n').map(function(line) {

if (line.indexOf('### ') === 0) return '<h3>' + line.slice(4) + '</h3>';

if (line.indexOf('## ') === 0) return '<h2>' + line.slice(3) + '</h2>';

if (line.indexOf('# ') === 0) return '<h1>' + line.slice(2) + '</h1>';

return line;

}).join('\n');

// Newlines to <br>

t = t.replace(/\n/g, '<br>');

// Restore real newlines inside <pre><code>

t = t.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, function(_, code) {

return '<pre><code>' + code.replace(/<br>/g, '\n') + '</code></pre>';

});

return t;

}

function addMsg(text, who) {

const wrap = document.createElement('div');

wrap.className = 'msg ' + who;

const bubble = document.createElement('div');

bubble.className = 'bubble';

bubble.innerHTML = renderMarkdown(text);

wrap.appendChild(bubble);

chat.appendChild(wrap);

window.scrollTo(0, document.body.scrollHeight);

return bubble;

}

async function sendMessage(userText) {

history.push({ role: 'user', content: userText });

const bubble = addMsg('', 'bot');

bubble.classList.add('typing');

bubble.innerHTML = 'thinking…';

try {

const res = await fetch(API_ENDPOINT, {

method: 'POST',

headers: { 'Content-Type': 'application/json' },

body: JSON.stringify({ messages: history.slice(-20) })

});

const data = await res.json();

bubble.classList.remove('typing');

if (!res.ok) {

bubble.innerHTML = '❌ Error: ' + (data.error || 'Unknown');

return;

}

const reply = data.reply || '(empty reply)';

bubble.innerHTML = renderMarkdown(reply);

history.push({ role: 'assistant', content: reply });

window.scrollTo(0, document.body.scrollHeight);

} catch (e) {

bubble.classList.remove('typing');

bubble.innerHTML = '❌ Network error: ' + e.message;

}

}

function handleSend() {

const text = input.value.trim();

if (!text) return;

addMsg(text, 'user');

input.value = '';

input.style.height = 'auto';

sendMessage(text);

}

send.addEventListener('click', handleSend);

input.addEventListener('keydown', function(e) {

if (e.key === 'Enter' && !e.shiftKey) {

e.preventDefault();

handleSend();

}

});

input.addEventListener('input', function() {

input.style.height = 'auto';

input.style.height = input.scrollHeight + 'px';

});

clear.addEventListener('click', function() {

if (confirm('Start a new chat?')) {

history = [];

chat.innerHTML = '';

addMsg("Fresh start, Joe. What's on your mind?", 'bot');

}

});

</script>

</body>

</html>
