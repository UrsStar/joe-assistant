<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joe · Intelligent Assistant</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at 20% 20%, #0c0c1e, #020205);
  color:#eef2ff;
}

/* safer cursor */
.cursor{
  position:fixed;
  width:24px;height:24px;
  background: radial-gradient(circle,#a0d0ff,#3a7ca5);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transition:transform .1s;
}

/* layout */
.app{display:flex;height:100vh;}
.sidebar{
  width:80px;
  background:rgba(10,12,24,.9);
  display:flex;flex-direction:column;align-items:center;
  padding:20px 0;
  transition:.3s;
}
.sidebar.expanded{width:220px;}

.new-chat-btn{
  width:50px;height:50px;border-radius:50%;
  border:none;cursor:pointer;
  background:#6366f1;color:#fff;font-size:20px;
}

.chat-main{flex:1;display:flex;flex-direction:column;padding:20px;}

.messages{
  flex:1;overflow-y:auto;
}

.message{margin:15px 0;display:flex;}
.user-message{justify-content:flex-end;}
.bot-message{justify-content:flex-start;}

.message-content{
  max-width:75%;
  padding:15px 20px;
  border-radius:20px;
}

.user-message .message-content{
  background:#6366f1;color:#fff;
}
.bot-message .message-content{
  background:#1e293b;
}

.input-area{display:flex;gap:10px;margin-top:10px;}
.input-field{
  flex:1;padding:15px;border-radius:30px;
  border:none;outline:none;
}
.send-btn{
  width:55px;border:none;border-radius:50%;
  background:#3b82f6;color:white;cursor:pointer;
}

/* typing */
.typing-dots span{
  display:inline-block;width:6px;height:6px;
  background:#aaa;border-radius:50%;
  animation:blink 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%,100%{opacity:.3;}
  50%{opacity:1;}
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <button class="new-chat-btn" onclick="newChat()">+</button>
  </div>

  <div class="chat-main">
    <div class="messages" id="messages">
      <div class="message bot-message">
        <div class="message-content">
          I'm Joe. Ask me anything.
        </div>
      </div>
    </div>

    <div class="input-area">
      <input id="messageInput" class="input-field" placeholder="Type...">
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ---------- STATE ---------- */
let isTyping = false;
let memory = [];
const MAX_MEMORY = 10;

/* ---------- ELEMENTS ---------- */
const messagesDiv = document.getElementById('messages');
const input = document.getElementById('messageInput');
const cursor = document.getElementById('cursor');

/* ---------- SAFE ADD MESSAGE ---------- */
function addMessage(text, sender){
  const msg = document.createElement('div');
  msg.className = "message " + sender + "-message";

  const content = document.createElement('div');
  content.className = "message-content";

  // SAFE TEXT (no innerHTML injection)
  content.textContent = text;

  msg.appendChild(content);
  messagesDiv.appendChild(msg);
  scrollToBottom();
}

/* ---------- SCROLL FIX ---------- */
function scrollToBottom(){
  requestAnimationFrame(()=>{
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

/* ---------- TYPING ---------- */
function showTyping(){
  const row = document.createElement('div');
  row.className = "message bot-message";
  row.id = "typing";

  row.innerHTML = `
    <div class="message-content typing-dots">
      <span></span><span></span><span></span>
    </div>
  `;
  messagesDiv.appendChild(row);
  scrollToBottom();
}

function removeTyping(){
  const t = document.getElementById("typing");
  if(t) t.remove();
}

/* ---------- RESPONSE ENGINE ---------- */
function generateResponse(text){
  text = text.toLowerCase();

  if(text.includes("hello")){
    return "Hey there 👋";
  }

  if(text.includes("code")){
    return "Looks like you're talking about code. Want help debugging?";
  }

  return "Interesting... tell me more.";
}

/* ---------- SEND ---------- */
function sendMessage(){
  const text = input.value.trim();
  if(!text || isTyping) return;

  addMessage(text, "user");
  input.value = "";

  showTyping();
  isTyping = true;

  setTimeout(()=>{
    removeTyping();

    const reply = generateResponse(text);
    addMessage(reply, "bot");

    memory.push({user:text,bot:reply});
    if(memory.length > MAX_MEMORY) memory.shift();

    isTyping = false;
  }, 1000);

  // failsafe
  setTimeout(()=>{ isTyping = false; }, 5000);
}

/* ---------- ENTER FIX ---------- */
input.addEventListener("keydown", (e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    sendMessage();
  }
});

/* ---------- CURSOR ---------- */
document.addEventListener("mousemove",(e)=>{
  cursor.style.left = e.clientX+"px";
  cursor.style.top = e.clientY+"px";
});

/* ---------- SIDEBAR ---------- */
const sidebar = document.getElementById("sidebar");
sidebar.addEventListener("mouseenter",()=>sidebar.classList.add("expanded"));
sidebar.addEventListener("mouseleave",()=>sidebar.classList.remove("expanded"));

/* ---------- NEW CHAT ---------- */
function newChat(){
  messagesDiv.innerHTML = `
    <div class="message bot-message">
      <div class="message-content">New chat started.</div>
    </div>
  `;
  memory = [];
}
</script>

</body>
</html>
