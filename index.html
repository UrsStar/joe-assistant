```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Joe Assistant</title>
<style>
body {
  background:#0a0a0f;
  color:white;
  font-family:Arial;
  margin:0;
}

#chat {
  height:80vh;
  overflow:auto;
  padding:10px;
}

.msg {
  background:#111;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
}

#input {
  width:100%;
  height:60px;
  border:none;
  outline:none;
  padding:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="chat"></div>
<textarea id="input" placeholder="Type and press Enter..."></textarea>

<script>
// ===== BASIC CHAT =====
let messages = [];

function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = messages.map(m => `<div class="msg">${m}</div>`).join("");
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  messages.push("You: " + text);
  input.value = "";

  render();

  setTimeout(() => {
    messages.push("Joe: " + getReply());
    render();
  }, 800);
}

function getReply() {
  const replies = [
    "I'm thinking...",
    "Tell me more.",
    "Interesting.",
    "Got it.",
    "Explain that again."
  ];
  return replies[Math.floor(Math.random() * replies.length)];
}

document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

render();
</script>

</body>
</html>
```
