<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joe AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
  transition:0.3s;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  margin:10px 0;
  padding:12px;
  border-radius:15px;
  max-width:70%;
}

.user{background:#3b82f6;margin-left:auto;}
.bot{background:#1e293b;}

.input-area{
  display:flex;
  padding:10px;
  background:#020617;
}

input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}

button{
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="messages" id="messages"></div>

<div class="input-area">
  <input id="input" placeholder="Talk to Joe...">
  <button onclick="sendMessage()">Send</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>
let memory = JSON.parse(localStorage.getItem("memory")) || [];
let isListening = false;

/* ---------- UI ---------- */
function addMessage(text,type){
  const div=document.createElement("div");
  div.className="message "+type;
  div.textContent=text;
  document.getElementById("messages").appendChild(div);
  scroll();
}

function scroll(){
  const m=document.getElementById("messages");
  m.scrollTop=m.scrollHeight;
}

function saveMemory(){
  localStorage.setItem("memory", JSON.stringify(memory));
}

/* ---------- VOICE OUTPUT ---------- */
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(u);
}

/* ---------- REACTION ---------- */
function react(text){
  if(text.includes("good")||text.includes("great")){
    document.body.style.background="#064e3b";
  }else if(text.includes("error")||text.includes("bad")){
    document.body.style.background="#7f1d1d";
  }else{
    document.body.style.background="#0f172a";
  }
}

/* ---------- REAL AI ---------- */
async function generateResponse(userText){
  const messages = memory.flatMap(m => ([
    { role:"user", content:m.user },
    { role:"assistant", content:m.bot }
  ]));

  messages.push({ role:"user", content:userText });

  const res = await fetch("https://YOUR-VERCEL-APP.vercel.app/api/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ messages })
  });

  const data = await res.json();
  return data.choices[0].message.content;
}

/* ---------- SEND ---------- */
async function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  addMessage("Typing...","bot");

  try{
    const reply = await generateResponse(text);

    document.getElementById("messages").lastChild.remove();

    addMessage(reply,"bot");
    speak(reply);
    react(reply);

    memory.push({user:text,bot:reply});
    if(memory.length>20) memory.shift();
    saveMemory();

  }catch{
    document.getElementById("messages").lastChild.remove();
    addMessage("⚠️ AI connection error","bot");
  }
}

/* ---------- VOICE INPUT (FIXED) ---------- */
const recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recog.lang="en-US";

function startVoice(){
  if(isListening) return;
  isListening = true;
  recog.start();
}

recog.onresult=function(e){
  const text=e.results[0][0].transcript;
  document.getElementById("input").value=text;
  sendMessage();
};

recog.onend=function(){
  isListening=false;
};

recog.onerror=function(){
  isListening=false;
};

/* ---------- ENTER KEY ---------- */
document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter") sendMessage();
});

/* ---------- LOAD MEMORY ---------- */
window.onload=()=>{
  memory.forEach(m=>{
    addMessage(m.user,"user");
    addMessage(m.bot,"bot");
  });
};
</script>

</body>
</html>
