<style>

*{margin:0;padding:0;box-sizing:border-box}

body{background:#0a0a0f;color:#e8e8e8;font-family:'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden}

#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/ SIDEBAR /

#sidebar{width:260px;background:rgba(8,8,18,0.95);backdrop-filter:blur(20px);display:flex;flex-direction:column;padding:12px;gap:6px;border-right:1px solid rgba(0,170,255,0.12);z-index:10;position:relative;flex-shrink:0}

#sidebar-logo{display:flex;align-items:center;gap:10px;padding:10px 12px 14px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:4px}

#sidebar-logo span{font-size:1rem;font-weight:800;background:linear-gradient(135deg,#00aaff,#19c37d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

#avatar{width:30px;height:30px;background:linear-gradient(135deg,#00aaff,#19c37d);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.85rem;color:#000;flex-shrink:0}

#new-chat-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#e8e8e8;font-size:0.85rem;border:1px solid rgba(0,170,255,0.2);background:rgba(0,170,255,0.05);width:100%;text-align:left;transition:all 0.2s;font-family:inherit}

#new-chat-btn:hover{background:rgba(0,170,255,0.12);border-color:rgba(0,170,255,0.4)}

#sidebar-title{padding:8px 12px 2px;font-size:0.68rem;color:#444;text-transform:uppercase;letter-spacing:1px}

#chat-history{flex:1;overflow-y:auto}

.sidebar-item{padding:8px 12px;border-radius:7px;cursor:pointer;font-size:0.82rem;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.15s;margin-bottom:2px}

.sidebar-item:hover{background:rgba(255,255,255,0.04);color:#ccc}

.sidebar-item.active{background:rgba(0,170,255,0.1);color:#e8e8e8;border-left:2px solid #00aaff;padding-left:10px}

#sidebar-bottom{margin-top:auto;padding:10px 12px;border-top:1px solid rgba(255,255,255,0.05);font-size:0.8rem;color:#555;display:flex;align-items:center;gap:8px}

.status-dot{width:7px;height:7px;background:#19c37d;border-radius:50%;box-shadow:0 0 6px #19c37d;animation:statusPulse 2s infinite;flex-shrink:0}

@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.4}}

/ MAIN /

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:10;min-width:0}

#chat{flex:1;overflow-y:auto;display:flex;flex-direction:column}

#chat::-webkit-scrollbar{width:4px}

#chat::-webkit-scrollbar-thumb{background:rgba(0,170,255,0.15);border-radius:2px}

/ MESSAGES /

.message-row{padding:20px 0;display:flex;justify-content:center;animation:fadeIn 0.3s ease}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.message-row.user-row{background:transparent}

.message-row.joe-row{background:rgba(255,255,255,0.015);border-top:1px solid rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.03)}

.message-inner{width:100%;max-width:740px;padding:0 24px;display:flex;gap:14px;align-items:flex-start}

.msg-avatar{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:900;flex-shrink:0;margin-top:2px}

.msg-avatar.user-av{background:linear-gradient(135deg,#00aaff,#0055aa);color:#fff}

.msg-avatar.joe-av{background:linear-gradient(135deg,#19c37d,#0a7a4a);color:#fff}

.msg-content{flex:1;font-size:0.94rem;line-height:1.75;color:#ddd;min-width:0}

.msg-name{font-weight:700;font-size:0.85rem;margin-bottom:6px;color:#fff}

.msg-body p{margin-bottom:12px}

.msg-body p:last-child{margin-bottom:0}

.msg-body h1,.msg-body h2,.msg-body h3{font-weight:700;margin:16px 0 8px;color:#fff}

.msg-body h1{font-size:1.3rem;border-bottom:1px solid rgba(0,170,255,0.15);padding-bottom:6px}

.msg-body h2{font-size:1.1rem}

.msg-body h3{font-size:1rem;color:#00aaff}

.msg-body ul,.msg-body ol{padding-left:22px;margin-bottom:12px}

.msg-body li{margin-bottom:5px}

.msg-body code{background:rgba(0,170,255,0.1);padding:2px 7px;border-radius:4px;font-family:'Courier New',monospace;font-size:0.83rem;color:#7dd3fc;border:1px solid rgba(0,170,255,0.1)}

.msg-body pre{background:#050508;border-radius:0 0 10px 10px;padding:16px;overflow-x:auto;margin:0;border:1px solid rgba(0,170,255,0.1);border-top:none}

.msg-body pre code{background:transparent;padding:0;color:#e8e8e8;border:none;font-size:0.84rem}

.msg-body blockquote{border-left:3px solid #00aaff;padding-left:14px;color:#888;margin:12px 0;font-style:italic}

.msg-body strong{color:#fff;font-weight:700}

.msg-body a{color:#00aaff;text-decoration:none}

.msg-body a:hover{text-decoration:underline}

.msg-body hr{border:none;border-top:1px solid rgba(255,255,255,0.07);margin:16px 0}

.msg-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:0.88rem}

.msg-body th,.msg-body td{padding:8px 14px;border:1px solid rgba(255,255,255,0.07);text-align:left}

.msg-body th{background:rgba(0,170,255,0.07);color:#fff;font-weight:600}

.msg-body tr:nth-child(even){background:rgba(255,255,255,0.02)}

/ CODE BLOCKS /

.code-wrap{margin:12px 0}

.code-header{display:flex;align-items:center;justify-content:space-between;background:rgba(0,170,255,0.06);border:1px solid rgba(0,170,255,0.1);border-bottom:none;border-radius:10px 10px 0 0;padding:6px 14px;font-size:0.72rem;color:#555}

.copy-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:5px;color:#555;font-size:0.72rem;padding:3px 10px;cursor:pointer;transition:all 0.2s;font-family:inherit}

/ WELCOME /

.typing span:nth-child(1){background:#00aaff}

#joe-face:hover{transform:scale(1.08);filter:drop-shadow(0 0 28px rgba(0,170,255,0.6))}

#joe-face svg{width:88px;height:88px}

#joe-bubble{position:fixed;bottom:208px;right:18px;background:rgba(6,6,16,0.97);border:1px solid rgba(0,170,255,0.3);border-radius:14px 14px 3px 14px;padding:10px 14px;font-size:0.78rem;color:#ddd;max-width:200px;z-index:1001;backdrop-filter:blur(12px);box-shadow:0 0 20px rgba(0,170,255,0.1);opacity:0;transform:translateY(8px) scale(0.92);transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;line-height:1.5}

#joe-bubble.show{opacity:1;transform:translateY(0) scale(1)}

#joe-face.talking{animation:joeGlow 0.7s infinite}

/ CAMERA /

#camera-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(14px)}

#camera-modal.show{display:flex}

#camera-box{background:#080810;border:1px solid rgba(0,170,255,0.2);border-radius:18px;padding:26px;display:flex;flex-direction:column;gap:16px;align-items:center;box-shadow:0 0 60px rgba(0,170,255,0.12);max-width:90vw}

#camera-video{width:420px;max-width:78vw;height:300px;border-radius:12px;background:#000;object-fit:cover;border:1px solid rgba(0,170,255,0.12)}

#camera-canvas{display:none}

.cam-btns{display:flex;gap:10px}

.cam-btn{padding:10px 22px;border-radius:9px;border:none;cursor:pointer;font-size:0.86rem;font-weight:700;transition:all 0.2s;font-family:inherit}

.cam-btn.primary{background:linear-gradient(135deg,#00aaff,#006ecc);color:#fff;box-shadow:0 0 14px rgba(0,170,255,0.3)}

.cam-btn.secondary{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#aaa}

.cam-btn:hover{transform:scale(1.04)}

/ MIC /

#mic-bar{display:none;position:fixed;bottom:180px;left:50%;transform:translateX(-50%);background:rgba(6,6,16,0.97);border:1px solid rgba(255,50,50,0.3);border-radius:30px;padding:9px 20px;font-size:0.83rem;color:#ff6060;z-index:1000;backdrop-filter:blur(10px);align-items:center;gap:10px;box-shadow:0 0 18px rgba(255,50,50,0.12);white-space:nowrap}

</style>

<script>

// ============================================================

// BACKGROUND PARTICLES

// ============================================================

const bgCanvas = document.getElementById('bg-canvas');

const bgCtx = bgCanvas.getContext('2d');

let mx = window.innerWidth / 2, my = window.innerHeight / 2;

function resizeBg() {

bgCanvas.width = window.innerWidth;

bgCanvas.height = window.innerHeight;

}

resizeBg();

window.addEventListener('resize', resizeBg);

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

const PCOUNT = 85;

const pts = [];

class Pt {

constructor() {

this.x = Math.random() * bgCanvas.width;

this.y = Math.random() * bgCanvas.height;

this.vx = (Math.random() - 0.5) * 0.45;

this.vy = (Math.random() - 0.5) * 0.45;

this.r = Math.random() * 1.6 + 0.4;

this.op = Math.random() * 0.45 + 0.1;

this.c = Math.random() > 0.5 ? '0,170,255' : '25,195,125';

}

update() {

this.x += this.vx;

this.y += this.vy;

if (this.x < 0 || this.x > bgCanvas.width) this.vx *= -1;

if (this.y < 0 || this.y > bgCanvas.height) this.vy *= -1;

}

draw() {

bgCtx.beginPath();

bgCtx.arc(this.x, this.y, this.r, 0, Math.PI * 2);

bgCtx.fillStyle = rgba(${this.c},${this.op});

bgCtx.fill();

}

}

for (let i = 0; i < PCOUNT; i++) pts.push(new Pt());

function drawBg() {

bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

const g = bgCtx.createRadialGradient(mx, my, 0, mx, my, 500);

g.addColorStop(0, 'rgba(0,60,100,0.07)');

g.addColorStop(1, 'rgba(0,0,0,0)');

bgCtx.fillStyle = g;

bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

for (let i = 0; i < pts.length; i++) {

for (let j = i + 1; j < pts.length; j++) {

const dx = pts[i].x - pts[j].x;

const dy = pts[i].y - pts[j].y;

const dist = Math.sqrt(dx dx + dy dy);

if (dist < 130) {

bgCtx.beginPath();

bgCtx.moveTo(pts[i].x, pts[i].y);

bgCtx.lineTo(pts[j].x, pts[j].y);

bgCtx.strokeStyle = rgba(0,170,255,${0.12 * (1 - dist / 130)});

bgCtx.lineWidth = 0.5;

bgCtx.stroke();

}

}

}

pts.forEach(p => { p.update(); p.draw(); });

requestAnimationFrame(drawBg);

}

drawBg();

// ============================================================

// JOE FACE — EYE TRACKING

// ============================================================

const joeEl = document.getElementById('joe-face');

const pupilLeft = document.getElementById('pupil-left');

const pupilRight = document.getElementById('pupil-right');

const shineLeft = document.getElementById('shine-left');

const shineRight = document.getElementById('shine-right');

const browLeft = document.getElementById('brow-left');

const browRight = document.getElementById('brow-right');

const joeMouth = document.getElementById('joe-mouth');

const joeBubble = document.getElementById('joe-bubble');

let bubbleVisible = false;

let joeTalking = false;

function movePupils() {

const rect = joeEl.getBoundingClientRect();

const cx = rect.left + rect.width / 2;

const
